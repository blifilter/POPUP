<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { font-family: 'Heebo', sans-serif; direction: rtl; }

.popup-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.78);
  backdrop-filter: blur(5px);
  -webkit-backdrop-filter: blur(5px);
  z-index: 999999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
  /* קבוע — לא גולל עם הדף */
  overflow: hidden;
}

.popup-overlay.show {
  opacity: 1;
  visibility: visible;
}

.banner {
  width: 100%;
  max-width: 360px;
  background: linear-gradient(135deg, #1a0505 0%, #2d0a0a 60%, #1a0505 100%);
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 22px;
  padding: clamp(20px, 5vw, 28px) clamp(16px, 5vw, 24px);
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(192,57,43,0.15);
  position: relative;
  overflow: hidden;
  transform: scale(0.85) translateY(30px);
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
}

.popup-overlay.show .banner {
  transform: scale(1) translateY(0);
}

.banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, rgba(212,168,67,0.015) 0px, rgba(212,168,67,0.015) 1px, transparent 1px, transparent 14px);
  pointer-events: none;
}

.close-btn {
  position: absolute;
  top: 12px;
  left: 12px;
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-size: 14px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  z-index: 2;
}
.close-btn:hover { background: rgba(255,255,255,0.15); color: white; }

.sale-tag {
  display: inline-block;
  background: linear-gradient(135deg, #c0392b, #7b1a1a);
  color: white;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 50px;
  margin-bottom: 14px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50%      { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}

.price-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 16px;
}

.price-old {
  font-size: clamp(18px, 5vw, 22px);
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  position: relative;
}
.price-old::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 2px;
  background: rgba(255,255,255,0.3);
  transform: rotate(-8deg);
}

.price-arrow { font-size: 16px; color: rgba(212,168,67,0.6); }

.price-new {
  font-size: clamp(36px, 10vw, 46px);
  font-weight: 900;
  color: #f0c060;
  line-height: 1;
  text-shadow: 0 0 30px rgba(212,168,67,0.4);
}
.price-new span { font-size: clamp(16px, 4vw, 20px); font-weight: 400; color: rgba(240,192,96,0.7); }

.timer-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.timer {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 20px;
}

.timer-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.timer-num {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  width: clamp(44px, 13vw, 52px);
  height: clamp(44px, 13vw, 52px);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(20px, 6vw, 24px);
  font-weight: 900;
  color: white;
  letter-spacing: -1px;
  transition: all 0.3s ease;
}

.timer-num.tick {
  background: rgba(192,57,43,0.2);
  border-color: rgba(192,57,43,0.3);
}

.timer-unit { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

.timer-sep {
  font-size: 20px;
  font-weight: 900;
  color: rgba(255,255,255,0.2);
  margin-top: 8px;
}

.buy-btn {
  display: block;
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  color: white;
  font-family: 'Heebo', sans-serif;
  font-size: clamp(16px, 4.5vw, 18px);
  font-weight: 900;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 6px 30px rgba(192,57,43,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
}

.buy-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shine 2.5s ease-in-out infinite;
}

@keyframes shine {
  0%  { left: -100%; }
  40% { left: 100%; }
  100%{ left: 100%; }
}

.buy-btn:hover  { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(192,57,43,0.65); }
.buy-btn:active { transform: scale(0.97); }

.buy-btn-sub {
  font-size: 11px;
  font-weight: 400;
  opacity: 0.8;
  margin-top: 3px;
  display: block;
}

.stock-note {
  margin-top: 12px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}
.stock-note strong { color: #f0c060; }
</style>
</head>
<body>

<div class="popup-overlay" id="bfPopup">
  <div class="banner">
    <button class="close-btn" onclick="closeBfPopup()">✕</button>
    <div class="sale-tag">⚡ מבצע מוגבל</div>

    <div class="price-wrap">
      <div class="price-old">₪99.90</div>
      <div class="price-arrow">←</div>
      <div class="price-new">₪59.90 <span>בלבד</span></div>
    </div>

    <div class="timer-label">המבצע נגמר בעוד</div>
    <div class="timer">
      <div class="timer-block">
        <div class="timer-num" id="bfHours">00</div>
        <div class="timer-unit">שעות</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-num" id="bfMinutes">00</div>
        <div class="timer-unit">דקות</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-num" id="bfSeconds">00</div>
        <div class="timer-unit">שניות</div>
      </div>
    </div>

    <a class="buy-btn" href="#" id="bfBuyBtn">
      🛒 לרכישה עכשיו
      <span class="buy-btn-sub">גישה מיידית • תשלום מאובטח</span>
    </a>

    <div class="stock-note">⏰ המחיר הזה <strong>לא יחזור</strong> אחרי סיום הטיימר</div>
  </div>
</div>

<script>
(function() {
  var DELAY   = 15000;   // 15 שניות
  var HOURS   = 24;
  var KEY     = 'blifilter_popup_v1';

  function pad(n) { return String(n).padStart(2,'0'); }

  function closeBfPopup() {
    document.getElementById('bfPopup').classList.remove('show');
    localStorage.setItem(KEY, '1');
  }
  window.closeBfPopup = closeBfPopup;

  // סגירה בלחיצה על הרקע
  document.getElementById('bfPopup').addEventListener('click', function(e) {
    if (e.target === this) closeBfPopup();
  });

  // הצג רק פעם אחת
  if (!localStorage.getItem(KEY)) {
    setTimeout(function() {
      document.getElementById('bfPopup').classList.add('show');
    }, DELAY);
  }

  // טיימר
  var endTime = new Date().getTime() + HOURS * 3600000;

  function updateTimer() {
    var diff = Math.max(0, endTime - new Date().getTime());
    var h = Math.floor(diff / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var secEl = document.getElementById('bfSeconds');
    secEl.classList.add('tick');
    setTimeout(function(){ secEl.classList.remove('tick'); }, 300);
    document.getElementById('bfHours').textContent   = pad(h);
    document.getElementById('bfMinutes').textContent = pad(m);
    document.getElementById('bfSeconds').textContent = pad(s);
    if (diff === 0) clearInterval(timer);
  }

  var timer = setInterval(updateTimer, 1000);
  updateTimer();
})();
</script>
</body>
</html>
