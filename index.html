<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  direction: rtl;
}

/* ── OVERLAY ── */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(4px);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease, visibility 0.4s ease;
}

.popup-overlay.show {
  opacity: 1;
  visibility: visible;
}

/* ── BANNER ── */
.banner {
  width: 100%;
  max-width: 420px;
  background: linear-gradient(135deg, #1a0505 0%, #2d0a0a 50%, #1a0505 100%);
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 24px;
  padding: 28px 24px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(192,57,43,0.15);
  position: relative;
  overflow: hidden;
  transform: scale(0.85) translateY(30px);
  transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
}

.popup-overlay.show .banner {
  transform: scale(1) translateY(0);
}

.banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    45deg,
    rgba(212,168,67,0.015) 0px,
    rgba(212,168,67,0.015) 1px,
    transparent 1px,
    transparent 14px
  );
  pointer-events: none;
}

/* ── סגירה ── */
.close-btn {
  position: absolute;
  top: 14px;
  left: 14px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  z-index: 2;
}
.close-btn:hover { background: rgba(255,255,255,0.15); color: white; }

/* ── תג מבצע ── */
.sale-tag {
  display: inline-block;
  background: linear-gradient(135deg, #c0392b, #7b1a1a);
  color: white;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  padding: 5px 16px;
  border-radius: 50px;
  margin-bottom: 16px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(192,57,43,0); }
}

/* ── מחירים ── */
.price-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}

.price-old {
  font-size: 22px;
  font-weight: 400;
  color: rgba(255,255,255,0.3);
  position: relative;
}
.price-old::after {
  content: '';
  position: absolute;
  left: 0; right: 0; top: 50%;
  height: 2px;
  background: rgba(255,255,255,0.3);
  transform: rotate(-8deg);
}

.price-arrow { font-size: 18px; color: rgba(212,168,67,0.6); }

.price-new {
  font-size: 46px;
  font-weight: 900;
  color: #f0c060;
  line-height: 1;
  text-shadow: 0 0 30px rgba(212,168,67,0.4);
}
.price-new span { font-size: 20px; font-weight: 400; color: rgba(240,192,96,0.7); }

/* ── טיימר ── */
.timer-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.timer {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}

.timer-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.timer-num {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 900;
  color: white;
  letter-spacing: -1px;
  transition: all 0.3s ease;
}

.timer-num.tick {
  background: rgba(192,57,43,0.2);
  border-color: rgba(192,57,43,0.3);
}

.timer-unit { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

.timer-sep {
  font-size: 22px;
  font-weight: 900;
  color: rgba(255,255,255,0.2);
  margin-top: 10px;
}

/* ── כפתור ── */
.buy-btn {
  display: block;
  width: 100%;
  padding: 18px;
  background: linear-gradient(135deg, #c0392b, #e74c3c);
  color: white;
  font-family: 'Heebo', sans-serif;
  font-size: 18px;
  font-weight: 900;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 6px 30px rgba(192,57,43,0.5);
  transition: transform 0.15s, box-shadow 0.15s;
  letter-spacing: 0.5px;
  position: relative;
  overflow: hidden;
}

.buy-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  animation: shine 2.5s ease-in-out infinite;
}

@keyframes shine {
  0%   { left: -100%; }
  40%  { left: 100%; }
  100% { left: 100%; }
}

.buy-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 40px rgba(192,57,43,0.65); }
.buy-btn:active { transform: scale(0.97); }

.buy-btn-sub {
  font-size: 12px;
  font-weight: 400;
  opacity: 0.8;
  margin-top: 3px;
  display: block;
}

.stock-note {
  margin-top: 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.3);
}
.stock-note strong { color: #f0c060; }
</style>
</head>
<body>

<div class="popup-overlay" id="popup">
  <div class="banner">
    <button class="close-btn" onclick="closePopup()">✕</button>
    <div class="sale-tag">⚡ מבצע מוגבל</div>

    <div class="price-wrap">
      <div class="price-old">₪99.90</div>
      <div class="price-arrow">←</div>
      <div class="price-new">₪59.90 <span>בלבד</span></div>
    </div>

    <div class="timer-label">המבצע נגמר בעוד</div>
    <div class="timer">
      <div class="timer-block">
        <div class="timer-num" id="hours">00</div>
        <div class="timer-unit">שעות</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-num" id="minutes">00</div>
        <div class="timer-unit">דקות</div>
      </div>
      <div class="timer-sep">:</div>
      <div class="timer-block">
        <div class="timer-num" id="seconds">00</div>
        <div class="timer-unit">שניות</div>
      </div>
    </div>

    <a class="buy-btn" href="#" id="buyBtn">
      🛒 לרכישה עכשיו
      <span class="buy-btn-sub">גישה מיידית • תשלום מאובטח</span>
    </a>

    <div class="stock-note">⏰ המחיר הזה <strong>לא יחזור</strong> אחרי סיום הטיימר</div>
  </div>
</div>

<script>
// ── הגדרות ──
const DELAY_SECONDS = 15;   // כמה שניות לחכות לפני שקופץ
const TIMER_HOURS   = 24;   // כמה שעות הטיימר רץ
const STORAGE_KEY   = 'blifilter_popup_seen';

// ── פופאפ רק פעם אחת ──
function showPopup() {
  if (localStorage.getItem(STORAGE_KEY)) return; // כבר ראה
  document.getElementById('popup').classList.add('show');
}

function closePopup() {
  document.getElementById('popup').classList.remove('show');
  localStorage.setItem(STORAGE_KEY, '1'); // שמור שראה
}

// סגירה בלחיצה על הרקע
document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closePopup();
});

// הצג אחרי 15 שניות
setTimeout(showPopup, DELAY_SECONDS * 1000);

// ── טיימר ──
const endTime = new Date().getTime() + TIMER_HOURS * 60 * 60 * 1000;

function pad(n) { return String(n).padStart(2, '0'); }

function updateTimer() {
  const diff = Math.max(0, endTime - new Date().getTime());
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  const secEl = document.getElementById('seconds');
  secEl.classList.add('tick');
  setTimeout(() => secEl.classList.remove('tick'), 300);

  document.getElementById('hours').textContent   = pad(h);
  document.getElementById('minutes').textContent = pad(m);
  document.getElementById('seconds').textContent = pad(s);

  if (diff === 0) clearInterval(interval);
}

const interval = setInterval(updateTimer, 1000);
updateTimer();
</script>
</body>
</html>
